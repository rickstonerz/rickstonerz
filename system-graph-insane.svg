  <g transform="translate(62,48)"><text class="title">NEURAL SYSTEM MAP</text><text y="28" class="sub">organic architecture view • category-only graph • public-safe</text></g>
  <g transform="translate(842,42)"><text class="stat">50+ systems</text><text x="118" class="stat">5.5M+ footprint</text><text x="258" class="stat">3.5+ years</text><text y="22" class="small">26+ local codebases • multi-machine build ecosystem</text></g>
