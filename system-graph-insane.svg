<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040814"/><stop offset="55%" stop-color="#0a1020"/><stop offset="100%" stop-color="#140c22"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5a5a" stop-opacity="0.95"/><stop offset="45%" stop-color="#ff5a5a" stop-opacity="0.22"/><stop offset="100%" stop-color="#ff5a5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/><stop offset="50%" stop-color="#22d3ee" stop-opacity="0.18"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hotLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5a5a"/><stop offset="50%" stop-color="#ff8a00"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#fff;letter-spacing:2px}.sub{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#9fb0c7;letter-spacing:1px}.stat{font:700 14px 'Consolas','Courier New',monospace;fill:#ffb366}.small{font:600 11px 'Consolas','Courier New',monospace;fill:#94a3b8}.label{font:600 15px 'Segoe UI',Arial,sans-serif;fill:#e8eef7;letter-spacing:.5px}.micro{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#d6deea}.linkA{stroke:url(#hotLine);stroke-width:1.4;fill:none;opacity:.28;stroke-linecap:round;stroke-dasharray:10 12;animation:dashA 10s linear infinite}.linkB{stroke:#22d3ee;stroke-width:1.1;fill:none;opacity:.18;stroke-linecap:round;stroke-dasharray:5 10;animation:dashB 14s linear infinite reverse}.mesh{stroke:rgba(255,255,255,0.08);stroke-width:1;fill:none}.nodeOuter{fill:rgba(255,255,255,0.03);stroke:rgba(255,255,255,0.16);stroke-width:1.1}.nodePulseA{animation:pulseA 2.4s ease-in-out infinite;transform-origin:center}.nodePulseB{animation:pulseB 3.2s ease-in-out infinite;transform-origin:center}.corePulse{animation:corePulse 3s ease-in-out infinite;transform-origin:600px 280px}.scan{animation:scan 6s linear infinite}.orbit1{animation:orbit1 24s linear infinite;transform-origin:600px 280px}.orbit2{animation:orbit2 36s linear infinite;transform-origin:600px 280px}.orbit3{animation:orbit3 18s linear infinite;transform-origin:600px 280px}.flickerA{animation:flickerA 1.7s ease-in-out infinite}.flickerB{animation:flickerB 2.6s ease-in-out infinite}.floatA{animation:floatA 5s ease-in-out infinite}.floatB{animation:floatB 6.5s ease-in-out infinite}.floatC{animation:floatC 7.2s ease-in-out infinite}
      @keyframes dashA{to{stroke-dashoffset:-260}}@keyframes dashB{to{stroke-dashoffset:-180}}@keyframes pulseA{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}@keyframes pulseB{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}@keyframes corePulse{0%,100%{transform:scale(1);opacity:.95}50%{transform:scale(1.03);opacity:1}}@keyframes scan{0%{transform:translateY(-140px);opacity:0}10%{opacity:.12}70%{opacity:.09}100%{transform:translateY(720px);opacity:0}}@keyframes orbit1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes orbit2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}@keyframes orbit3{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}@keyframes flickerA{0%,100%{opacity:.45}50%{opacity:1}}@keyframes flickerB{0%,100%{opacity:.3}50%{opacity:.9}}@keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}@keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    </style>
  </defs>
  <rect width="1200" height="560" rx="24" fill="url(#bg)"/>
