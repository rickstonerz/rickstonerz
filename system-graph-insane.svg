  <circle cx="600" cy="280" r="136" class="mesh"/><circle cx="600" cy="280" r="186" class="mesh" opacity="0.6"/><circle cx="600" cy="280" r="236" class="mesh" opacity="0.4"/>
  <g class="orbit1"><circle cx="736" cy="280" r="4.5" fill="#ff8a00" filter="url(#tinyGlow)"/><circle cx="600" cy="144" r="4.5" fill="#22d3ee" filter="url(#tinyGlow)"/></g>
