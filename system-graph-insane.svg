  <g class="floatA"><circle cx="972" cy="398" r="38" class="nodeOuter nodePulseA"/><circle cx="972" cy="398" r="7" fill="#22d3ee" class="flickerB" filter="url(#tinyGlow)"/><text x="972" y="404" text-anchor="middle" class="label">INFRA</text></g>
  <g class="floatB"><circle cx="600" cy="124" r="34" class="nodeOuter nodePulseA"/><circle cx="600" cy="124" r="7" fill="#ff5a5a" class="flickerA" filter="url(#tinyGlow)"/><text x="600" y="130" text-anchor="middle" class="label">AUTOMATION</text></g>
